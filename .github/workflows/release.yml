name: Release

on:
  push:
    branches: [main]
    tags:
      - "mars-bluetooth-hci@*"
      - "mars-common@*"

jobs:
  version-bump:
    name: Version bump
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install cocogitto
        uses: cocogitto/cocogitto-action@v4
        with:
          install-only: true
      - name: Install cargo-edit
        run: cargo install cargo-edit
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Check for version bump
        id: check
        run: |
          if cog bump --auto --dry-run 2>/dev/null; then
            echo "bump_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "bump_needed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Semver release
        if: steps.check.outputs.bump_needed == 'true'
        run: cog bump --auto
      - name: Push version bump commit and tags
        if: steps.check.outputs.bump_needed == 'true'
        run: |
          git push
          git push --tags

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/mars-bluetooth-hci@') || startsWith(github.ref, 'refs/tags/mars-common@')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: changelog
        uses: cocogitto/cocogitto-action@v4
        with:
          command: changelog
          args: --at ${{ github.ref_name }}
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.stdout }}